services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: mini-accounting-app

    working_dir: /var/www

    volumes:
      - .:/var/www

    ports:
      - "8000:8000"

    tty: true

  mysql:
    image: mysql:8.0

    container_name: mini-accounting-db

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mini_accounting

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: